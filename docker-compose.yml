services:
  eureka-server:
    build: ./eureka_service
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api_gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_started

  auth-service:
    build: ./m1_auth_service
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_started

  user-service:
    build: ./m2_user_service
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_started

  prifile-service:
    build: ./m3_prifile_service
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_started

  building-service:
    build: ./m4_building_service
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_started

  room-service:
    build: ./m5_room-service
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_started

  teacher-service:
    build: ./m6_teacher-service
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_started

  curriculum-service:
