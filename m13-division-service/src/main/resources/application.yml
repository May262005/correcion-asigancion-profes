spring:
  application:
    name: m13-division-service
  
  datasource:
    url: jdbc:postgresql://switchyard.proxy.rlwy.net:44805/railway
    username: postgres
    password: GcsEmbPNyJCDzIPDWiApeZlNfmtWKdTB
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public

server:
  port: 8093

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

logging:
  level:
    com.example.m13_division_service: DEBUG
    org.springframework.web: INFO